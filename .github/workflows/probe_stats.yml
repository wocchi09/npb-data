name: Probe Stats Page

# 出場成績ページ（/stats）の構造調査用
# スタメン・打撃成績・投手成績が取得できるかを確認する

on:
  workflow_dispatch:
    inputs:
      game_id:
        description: "調査する試合ID"
        required: false
        default: "2021039164"

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4

      - name: Probe stats page
        run: |
          python - <<'PYEOF'
          import re, requests
          from bs4 import BeautifulSoup

          GID = "${{ github.event.inputs.game_id }}" or "2021039164"
          URL = f"https://baseball.yahoo.co.jp/npb/game/{GID}/stats"
          H = {"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"}

          print(f"[INFO] fetching: {URL}")
          r = requests.get(URL, headers=H, timeout=30)
          html = r.text
          print(f"[INFO] status={r.status_code} size={len(html)}")

          with open("probe_stats.html","w",encoding="utf-8") as f:
              f.write(html)

          # タイトルでページ種別を確認
          m = re.search(r"<title>(.*?)</title>", html, re.S)
          title = m.group(1).strip() if m else "-"

          soup = BeautifulSoup(html, "html.parser")
          # scriptを除いた表示部だけを対象にする
          for s in soup(["script","style"]):
              s.decompose()
          body = str(soup)

          L = ["# statsページ調査", "", f"- URL: {URL}", f"- title: {title}",
               f"- HTTP: {r.status_code} / size: {len(html)}", ""]

          L.append("## 表示部のキーワード出現（script除去後）")
          L.append("")
          L.append("| キーワード | 件数 |")
          L.append("|---|---|")
          for kw in ["打順","守備","打数","安打","打点","三振","四球","本塁打",
                     "投球回","被安打","自責点","防御率","球数","奪三振","代打","代走"]:
              L.append(f"| {kw} | {body.count(kw)} |")

          # テーブル構造の一覧
          L.append("")
          L.append("## テーブル一覧")
          L.append("")
          for i, t in enumerate(soup.find_all("table")[:12]):
              cls = " ".join(t.get("class", []))
              headers = [th.get_text(strip=True) for th in t.find_all("th")[:14]]
              rows = len(t.find_all("tr"))
              L.append(f"### table#{i} class=`{cls}` / {rows}行")
              L.append("")
              L.append(f"見出し: {headers}")
              # 最初のデータ行
              trs = t.find_all("tr")
              for tr in trs[1:3]:
                  cells = [td.get_text(strip=True) for td in tr.find_all(["td","th"])[:14]]
                  if any(cells):
                      L.append(f"データ例: {cells}")
              L.append("")

          open("probe_stats.md","w",encoding="utf-8").write("\n".join(L))
          print("\n".join(L[:80]))
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: probe-stats-html
          path: probe_stats.html

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add probe_stats.md
          git diff --cached --quiet || git commit -m "probe: stats page report"
          git pull --rebase origin main || true
          git push
          
