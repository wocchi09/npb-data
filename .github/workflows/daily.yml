name: Daily NPB Data Collection

on:
  schedule:
    # JST 23:47 = UTC 14:47（試合終了後・毎時0分を避けて混雑回避）
    - cron: "47 14 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "収集する日付（YYYY-MM-DD）。空欄なら今日"
        required: false
        default: ""
      game:
        description: "特定の試合IDだけ収集（任意）"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.game }}" ]; then
            ARGS="$ARGS --game ${{ github.event.inputs.game }}"
          fi
          python scraper/main.py $ARGS

      - name: Rebuild season stats (idempotent)
        run: |
          # 収集対象日からシーズンを決定（空なら今年）
          SEASON="${{ github.event.inputs.date }}"
          SEASON="${SEASON%%-*}"
          if [ -z "$SEASON" ]; then SEASON=$(date +%Y); fi
          python scraper/rebuild_stats.py --season "$SEASON" || echo "再集計をスキップ"

      - name: Validate data
        run: |
          # 検証は失敗してもワークフローは止めない（情報として記録）
          python scraper/validate_data.py || echo "検証で問題を検出（ログ参照）"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 保険：Pythonキャッシュが混入しても追跡から外す
          git rm -r --cached --ignore-unmatch "scraper/__pycache__" >/dev/null 2>&1 || true
          find . -name "__pycache__" -type d -prune -exec rm -rf {} + 2>/dev/null || true

          # 変更（新規・更新・削除）をすべてステージしてコミット
          # ここでコミットまで済ませると作業ツリーが綺麗になり、rebaseが通る
          git add -A
          if git diff --cached --quiet; then
            echo "変更なし。pushをスキップします。"
            exit 0
          fi
          git commit -m "data: auto collect $(date +'%Y-%m-%d %H:%M')"

          # リモートの最新を取り込んでからpush（競合時は最大3回リトライ）
          for i in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "push成功"
                exit 0
              fi
            else
              echo "rebase失敗。中断して再試行します。"
              git rebase --abort || true
            fi
            echo "リトライ $i 回目"
            sleep 5
          done

          echo "pushに3回失敗しました。"
          exit 1
