<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPB SCOREBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF9F0;--panel:#FFFFFF;--panel2:#FFF4E3;
    --line:#F0D9B5;--line2:#E5C596;
    --ink:#3D2510;--ink2:#6B4A28;--muted:#9A7B57;
    --accent:#E8590C;--accent2:#F59F00;--gold:#FFC93C;
    --hit:#D9480F;--out:#1C7ED6;
    --board-bg:#2B1B0E;--board-ink:#FFD43B;--board-line:#5A4028;
    --field:#2F6B3A;--field2:#C9A227;--dirt:#B07C4A;
    --shadow:0 2px 10px rgba(120,70,20,.10);
  }
  [data-theme="dark"]{
    --bg:#1A1208;--panel:#241809;--panel2:#2E1F0D;
    --line:#3D2A13;--line2:#54391B;
    --ink:#FFF0DB;--ink2:#E8CFA8;--muted:#A98858;
    --accent:#FF922B;--accent2:#FFC93C;--gold:#FFD43B;
    --hit:#FFA94D;--out:#74C0FC;
    --board-bg:#120C05;--board-ink:#FFD43B;--board-line:#3D2A13;
    --field:#1E4A28;--field2:#8A6415;--dirt:#7A5433;
    --shadow:0 2px 10px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'BIZ UDPGothic','Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;font-size:15.5px;line-height:1.75;transition:background .2s,color .2s;}
  .wrap{max-width:900px;margin:0 auto;padding:0 14px 60px;}

  .hero{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
    padding:18px 0 16px;margin-bottom:16px;}
  .hero-in{max-width:900px;margin:0 auto;padding:0 14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .hero h1{font-family:'Roboto Mono',monospace;font-weight:700;
    font-size:clamp(19px,4.6vw,26px);color:#fff;letter-spacing:.16em;
    text-shadow:0 2px 6px rgba(120,50,0,.35);}
  .hero p{font-size:11px;color:rgba(255,255,255,.9);letter-spacing:.15em;}
  .theme-btn{background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.55);
    color:#fff;font-size:19px;font-weight:700;width:42px;height:42px;
    border-radius:10px;cursor:pointer;flex-shrink:0;}
  .theme-btn:hover{background:rgba(255,255,255,.34);}

  .datebar{background:var(--panel);border:2px solid var(--line);
    border-radius:12px;padding:12px;box-shadow:var(--shadow);}
  .drow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  input[type=date]{font-family:inherit;font-size:16px;font-weight:700;
    background:var(--panel2);color:var(--ink);border:2px solid var(--line2);
    border-radius:9px;padding:9px 11px;flex:1 1 160px;min-width:150px;}
  [data-theme="dark"] input[type=date]{color-scheme:dark;}
  .btn{font-family:inherit;font-size:13px;font-weight:700;background:var(--panel2);
    color:var(--accent);border:2px solid var(--line2);border-radius:9px;
    padding:9px 13px;cursor:pointer;white-space:nowrap;}
  .btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}

  .games{margin-top:14px;display:grid;gap:10px;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));}
  .game{background:var(--panel);border:2px solid var(--line);border-radius:12px;
    padding:13px 15px;cursor:pointer;box-shadow:var(--shadow);
    transition:transform .12s,border-color .12s;}
  .game:hover{border-color:var(--accent);transform:translateY(-2px);}
  .game.on{border-color:var(--accent);background:var(--panel2);}
  .gcard{font-size:17px;font-weight:700;}
  .gscore{font-size:19px;font-weight:700;display:flex;align-items:baseline;
    gap:7px;flex-wrap:wrap;}
  .gscore .w{color:var(--accent);}
  .gscore .dash{color:var(--muted);font-size:15px;}
  .gscore .gstate{font-size:10.5px;color:var(--muted);font-weight:500;
    border:1px solid var(--line2);border-radius:20px;padding:1px 7px;margin-left:2px;}
  .gpit{font-size:12px;color:var(--ink2);margin-top:5px;}
  .gpit b{color:var(--accent);font-weight:700;font-size:11px;}
  .ghr{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .gmeta{font-size:11.5px;color:var(--muted);margin-top:4px;}

  .board{background:var(--board-bg);border-radius:12px;padding:12px;
    margin-top:16px;overflow-x:auto;box-shadow:var(--shadow);}
  table.sb{border-collapse:collapse;width:100%;min-width:420px;
    font-family:'Roboto Mono',monospace;}
  table.sb th,table.sb td{border:1px solid var(--board-line);padding:6px 4px;
    text-align:center;min-width:28px;color:var(--board-ink);font-size:16px;font-weight:500;}
  table.sb th{font-size:12px;color:#C9A227;}
  table.sb td.team{text-align:left;padding-left:10px;min-width:100px;
    font-family:'BIZ UDPGothic',sans-serif;font-weight:700;font-size:14px;
    color:#FFF3D6;white-space:nowrap;}
  table.sb td.total{color:#fff;font-weight:700;background:rgba(255,212,59,.12);}
  table.sb td.cell:hover{background:rgba(255,212,59,.22);}
  table.sb .win{color:#FFD43B;}

  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px;
    padding:11px 13px;background:var(--panel);border:2px solid var(--line);
    border-radius:12px;box-shadow:var(--shadow);}
  .toolbar .lb{font-size:12px;color:var(--muted);font-weight:700;}
  select{font-family:inherit;font-size:13px;font-weight:700;background:var(--panel2);
    color:var(--ink);border:2px solid var(--line2);border-radius:9px;
    padding:7px 9px;cursor:pointer;}

  .inn{margin-top:12px;background:var(--panel);border:2px solid var(--line);
    border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  .inn-h{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:11px 14px;cursor:pointer;background:var(--panel2);}
  .inn-h:hover{background:var(--line);}
  .inn-t{font-size:15px;font-weight:700;color:var(--accent);}
  .inn-m{font-size:11.5px;color:var(--muted);font-weight:500;}
  .caret{color:var(--accent);font-size:13px;transition:transform .15s;}
  .inn.open .caret{transform:rotate(90deg);}
  .inn-b{display:none;}
  .inn.open .inn-b{display:block;}

  .ab{border-top:2px solid var(--line);}
  /* 打席ヘッダ：左＝選手情報 / 右＝ダイヤモンド＋カウント */
  .ab-h{display:grid;grid-template-columns:1fr auto;gap:12px;
    padding:11px 14px;align-items:start;}
  .ab-p{font-size:13.5px;line-height:1.75;}
  .ab-p b{font-weight:700;}
  .ab-p .lbl{color:var(--muted);font-size:11.5px;}
  .no{font-family:'Roboto Mono',monospace;color:var(--accent2);font-size:11.5px;}
  .res{display:inline-block;font-size:12.5px;font-weight:700;color:#fff;
    background:var(--accent);padding:3px 10px;border-radius:20px;margin-top:5px;}
  .res.hit{background:var(--hit);}
  .res.out{background:var(--out);}

  /* ---- ダイヤモンド（走者図） ---- */
  .situ{display:flex;gap:10px;align-items:center;flex-shrink:0;}
  .dia{width:58px;height:58px;position:relative;}
  .bs{position:absolute;width:14px;height:14px;background:var(--panel2);
    border:2px solid var(--line2);transform:rotate(45deg);}
  .bs.on{background:var(--gold);border-color:var(--accent);}
  .bs.b1{right:0;top:22px;} .bs.b2{left:22px;top:0;} .bs.b3{left:0;top:22px;}
  .bs.home{left:22px;bottom:0;top:auto;background:var(--line2);border-color:var(--muted);}
  .cnt{font-size:11px;line-height:1.5;}
  .cnt .row{display:flex;align-items:center;gap:4px;}
  .cnt .k{width:12px;font-weight:700;color:var(--muted);font-family:'Roboto Mono',monospace;}
  .dotc{width:9px;height:9px;border-radius:50%;background:var(--panel2);
    border:1.5px solid var(--line2);display:inline-block;}
  .dotc.b{background:#40C057;border-color:#2B8A3E;}
  .dotc.s{background:#FAB005;border-color:#E67700;}
  .dotc.o{background:#FA5252;border-color:#C92A2A;}

  /* ---- 打球方向フィールド ---- */
  .fieldbox{margin:4px 14px 10px;padding:8px;background:var(--panel2);
    border:2px solid var(--line);border-radius:10px;
    display:flex;gap:12px;align-items:center;}
  .fieldsvg{width:110px;height:92px;flex-shrink:0;}
  .fieldtxt{font-size:12px;color:var(--ink2);line-height:1.7;}
  .fieldtxt b{color:var(--accent);font-weight:700;}

  .pt{display:grid;grid-template-columns:26px 1fr auto;gap:10px;align-items:center;
    padding:7px 14px;border-top:1px dashed var(--line);}
  .pt-n{width:24px;height:24px;line-height:21px;text-align:center;
    font-family:'Roboto Mono',monospace;font-size:12px;border-radius:50%;
    background:var(--panel2);border:2px solid var(--line2);color:var(--accent);}
  .pt-n.k-ball{border-color:#40C057;color:#2B8A3E;}
  .pt-n.k-strike{border-color:#FAB005;color:#E67700;}
  .pt-n.k-hit{border-color:var(--accent);background:var(--accent);color:#fff;}
  .pt-n.k-out{border-color:#1C7ED6;color:#1C7ED6;}
  .pt-t{font-size:14px;font-weight:700;}
  .pt-s{font-family:'Roboto Mono',monospace;font-weight:700;color:var(--accent);font-size:14.5px;letter-spacing:-.02em;}
  .pt-c{font-size:11px;color:var(--muted);}
  .pt-r{font-size:12.5px;text-align:right;color:var(--ink2);font-weight:700;}
  .pt-r.hit{color:var(--hit);} .pt-r.out{color:var(--out);}

  /* ---- タブ ---- */
  .tabs{display:flex;gap:6px;margin-top:16px;overflow-x:auto;
    padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .tab{flex-shrink:0;font-family:inherit;font-size:14px;font-weight:700;
    padding:10px 18px;border-radius:10px 10px 0 0;cursor:pointer;
    background:var(--panel2);color:var(--muted);
    border:2px solid var(--line);border-bottom:none;}
  .tab:hover{color:var(--accent);}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* ---- 成績カード・テーブル ---- */
  .card2{background:var(--panel);border:2px solid var(--line);border-radius:12px;
    padding:14px;margin-top:12px;box-shadow:var(--shadow);}
  .card2 h3{font-size:15px;color:var(--accent);margin-bottom:10px;}
  .kv{display:flex;gap:10px;align-items:baseline;padding:4px 0;
    border-bottom:1px dashed var(--line);font-size:14px;}
  .kv:last-child{border-bottom:none;}
  .kv .k{color:var(--muted);font-size:12px;min-width:70px;}
  .kv .sub{color:var(--muted);font-size:12px;}
  .card2 .sub{color:var(--ink2);font-size:13px;}

  .tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table.stbl{border-collapse:collapse;width:100%;min-width:520px;font-size:13px;}
  table.stbl th{background:var(--panel2);color:var(--muted);font-size:11.5px;
    padding:7px 6px;white-space:nowrap;position:sticky;top:0;
    border-bottom:2px solid var(--line);}
  table.stbl td{padding:7px 6px;border-bottom:1px solid var(--line);
    white-space:nowrap;text-align:center;}
  table.stbl td.nm,table.stbl th.nm{text-align:left;font-weight:700;
    position:sticky;left:0;background:var(--panel);min-width:88px;}
  table.stbl th.nm{background:var(--panel2);}
  table.stbl td.num{font-family:'Roboto Mono',monospace;}
  table.stbl td.hi{color:var(--accent);font-weight:700;}
  table.stbl tr:hover td{background:var(--panel2);}
  .dec{display:inline-block;font-size:11px;font-weight:700;min-width:20px;}
  .dec.win{color:var(--accent);} .dec.lose{color:var(--out);}
  .dec.save{color:var(--accent2);}

  /* ---- 配球分析 ---- */
  .bar-row{display:grid;grid-template-columns:80px 1fr auto;gap:10px;
    align-items:center;padding:5px 0;font-size:13px;}
  .bar-lb{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{background:var(--panel2);border-radius:20px;height:16px;overflow:hidden;
    border:1px solid var(--line);}
  .bar-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));
    height:100%;border-radius:20px;min-width:2px;}
  .bar-val{font-family:'Roboto Mono',monospace;font-size:12.5px;
    white-space:nowrap;color:var(--accent);font-weight:700;}
  .sub2{color:var(--muted);font-weight:400;font-size:11px;}

  .statrow{display:flex;gap:10px;flex-wrap:wrap;}
  .stat{flex:1 1 80px;text-align:center;background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;padding:10px 6px;}
  .stat .sv{font-family:'Roboto Mono',monospace;font-size:22px;
    font-weight:700;color:var(--accent);}
  .stat .sl{font-size:11px;color:var(--muted);margin-top:2px;}

  .heat{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;
    max-width:280px;margin:0 auto;}
  .hcell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;
    border:1px solid var(--line);border-radius:4px;color:var(--ink);}
  .hcell.zone{border-color:var(--accent);border-width:2px;}
  .heat-lg{display:flex;align-items:center;gap:6px;margin-top:10px;
    font-size:11px;color:var(--muted);}
  .hgrad{width:60px;height:10px;border-radius:5px;
    background:linear-gradient(90deg,rgba(232,89,12,.1),rgba(232,89,12,.85));}

  /* ---- 配球チャート（打席単位） ---- */
  .chartbox{margin:4px 14px 10px;padding:8px;background:var(--panel2);
    border:2px solid var(--line);border-radius:10px;
    display:flex;gap:12px;align-items:center;}
  .chartsvg{width:120px;height:120px;flex-shrink:0;}
  .charttxt{font-size:12px;color:var(--ink2);line-height:1.6;}
  .charttitle{font-weight:700;color:var(--accent);margin-bottom:4px;}
  .lg{display:flex;align-items:center;gap:5px;font-size:11px;}
  .lgd{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .chartnote{font-size:10px;color:var(--muted);margin-top:4px;}

  .msg{margin-top:16px;padding:30px 14px;text-align:center;
    border:2px dashed var(--line2);border-radius:12px;
    color:var(--muted);font-size:14px;line-height:2;}
  .foot{margin-top:22px;font-size:11.5px;color:var(--muted);line-height:1.9;
    border-top:2px solid var(--line);padding-top:12px;}
  @media(max-width:560px){
    .games{grid-template-columns:1fr;}
    .ab-h{grid-template-columns:1fr;}
    .situ{margin-top:6px;}
    .pt{grid-template-columns:24px 1fr;}
    .pt-r{grid-column:2;text-align:left;padding-top:2px;}
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="hero-in">
      <div><h1>NPB SCOREBOARD</h1><p>PITCH BY PITCH DATA</p></div>
      <button class="theme-btn" id="tb" onclick="toggleTheme()" title="ライト／ダーク切替">◐</button>
    </div>
  </div>

  <div class="wrap">
    <div class="datebar">
      <div class="drow">
        <input type="date" id="dp">
        <button class="btn" onclick="shift(-1)">◀ 前日</button>
        <button class="btn primary" onclick="today()">今日</button>
        <button class="btn" onclick="shift(1)">翌日 ▶</button>
      </div>
    </div>
    <div id="games" class="games"></div>
    <div id="detail"></div>
    <div class="foot">
      ▸ データは毎晩 JST 23時台に自動収集。過去の日付は Actions の「Run workflow」で収集できます。<br>
      ▸ 得点・カウントは打席データからの推定値です。コースは配球図座標の近似です。
    </div>
  </div>

<script>
  var dp=document.getElementById("dp"),
      gamesEl=document.getElementById("games"),
      detailEl=document.getElementById("detail"),
      curGame=null;

  function applyTheme(t){
    if(t==="dark") document.documentElement.setAttribute("data-theme","dark");
    else document.documentElement.removeAttribute("data-theme");
    document.getElementById("tb").textContent=(t==="dark")?"☀":"☾";
    try{localStorage.setItem("npbTheme",t);}catch(e){}
  }
  function toggleTheme(){
    var c=document.documentElement.getAttribute("data-theme")==="dark"?"dark":"light";
    applyTheme(c==="dark"?"light":"dark");
  }
  (function(){var t="light";try{t=localStorage.getItem("npbTheme")||"light";}catch(e){}applyTheme(t);})();

  function todayJST(){return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10);}
  function sumPath(d){var p=d.split("-");return "data/"+p[0]+"/"+p[1]+"/"+p[2]+"/_summary.json";}
  function gamePath(d,g){var p=d.split("-");return "data/"+p[0]+"/"+p[1]+"/"+p[2]+"/"+g+".json";}
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
  function rcls(r){
    if(!r) return "";
    if(/本塁打|安打|塁打|適時|四球|死球|安$|本$|２$|2$/.test(r)) return "hit";
    if(/三振|ゴロ|フライ|併殺|邪飛|直|飛$|犠/.test(r)) return "out";
    return "";
  }

  /* スコアボード（H/E付き・イニングセルはタップでジャンプ） */
  function buildBoard(g){
    var maxInn=1,i,away={},home={};
    var hitA=0,hitH=0,errA=0,errH=0;
    (g.atbats||[]).forEach(function(ab){
      if(ab.inning>maxInn) maxInn=ab.inning;
      var rs=ab.result_summary||"";
      var m=/＋(\d+)点/.exec(rs);
      var pts=m?parseInt(m[1],10):0;
      var isTop=(ab.top_bottom==="表");
      var t=isTop?away:home;
      t[ab.inning]=(t[ab.inning]||0)+pts;
      // H: 攻撃側の安打（安打・2塁打・3塁打・本塁打）
      if(/安打|２塁打|２塁打|2塁打|二塁打|三塁打|3塁打|塁打|本塁打/.test(rs)&&!/併殺/.test(rs)){
        if(isTop) hitA++; else hitH++;
      }
      // E: 守備側のエラー
      if(/エラー/.test(rs)){
        if(isTop) errH++; else errA++;
      }
    });
    if(maxInn<9) maxInn=9;
    var ta=0,th=0;
    for(i=1;i<=maxInn;i++){ta+=(away[i]||0);th+=(home[i]||0);}
    // 公式スコアがあれば計欄はそちらを使う
    var offA=null,offH=null,official=false;
    if(g.final_score&&g.final_score.length){
      g.final_score.forEach(function(s){
        if(s.team===g.away) offA=s.score;
        if(s.team===g.home) offH=s.score;
      });
      if(offA!=null&&offH!=null){ta=offA;th=offH;official=true;}
    }
    var h='<div class="board"><table class="sb"><thead><tr><th class="team"></th>';
    for(i=1;i<=maxInn;i++) h+='<th>'+i+'</th>';
    h+='<th>計</th><th>安</th><th>失</th></tr></thead><tbody>';
    [[g.away,away,ta,hitA,errA,"表"],[g.home,home,th,hitH,errH,"裏"]].forEach(function(row){
      h+='<tr><td class="team">'+esc(row[0]||"-")+'</td>';
      for(i=1;i<=maxInn;i++){
        var v=row[1][i];
        h+='<td class="cell" onclick="jumpInn('+i+',\''+row[5]+'\')" '+
           'style="cursor:pointer">'+(v==null?"-":v)+'</td>';
      }
      var win=(row[2]===Math.max(ta,th)&&ta!==th);
      h+='<td class="total'+(win?" win":"")+'">'+row[2]+'</td>'+
         '<td>'+row[3]+'</td><td>'+row[4]+'</td></tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="font-size:11px;color:var(--muted);margin-top:6px;">'+
       (official?'※ 合計は公式スコア／イニング別・安・失は打席結果からの推定値':'※ 得点・安打・失策は打席結果からの推定値')+
       '／数字をタップするとそのイニングに移動します</div>';
    return h;
  }

  /* イニングへジャンプ（閉じてたら開く） */
  function jumpInn(inning,tb){
    var el=document.getElementById("inn-"+inning+"-"+tb);
    if(!el) return;
    el.classList.add("open");
    el.scrollIntoView({behavior:"smooth",block:"start"});
  }

  /* ダイヤモンド＋カウント（B緑・S黄・O赤）本塁なし */
  function buildSitu(ab){
    var r=ab.runners||{},c=ab.count||{};
    var h='<div class="situ"><div class="dia">'+
      '<div class="bs b2'+(r.second?" on":"")+'"></div>'+
      '<div class="bs b3'+(r.third?" on":"")+'"></div>'+
      '<div class="bs b1'+(r.first?" on":"")+'"></div>'+
      '</div><div class="cnt">';
    var rows=[["B",c.ball||0,3,"b"],["S",c.strike||0,2,"s"],["O",c.out||0,2,"o"]];
    rows.forEach(function(x){
      h+='<div class="row"><span class="k">'+x[0]+'</span>';
      for(var i=0;i<x[2];i++){
        h+='<span class="dotc '+(i<x[1]?x[3]:"")+'"></span>';
      }
      h+='</div>';
    });
    h+='</div></div>';
    return h;
  }

  /* ---- 走者名の推定エンジン ----
     打席の流れをシミュレートして「誰が塁にいるか」を推定する。
     各打席の塁コード(b110等)は公式値なので、毎打席それと答え合わせし、
     矛盾したら名前を「?」に落とす（塁の有無自体は常に公式値が正）。 */
  function inferRunnerNames(atbats){
    var bases={1:null,2:null,3:null}; // 各塁の走者名
    var curKey=null;
    atbats.forEach(function(ab){
      var key=ab.inning+"-"+ab.top_bottom;
      if(key!==curKey){ // イニングが変わったらリセット
        bases={1:null,2:null,3:null};
        curKey=key;
      }
      var r=ab.runners||{};
      // 公式の塁コードと答え合わせ
      var occ={1:!!r.first,2:!!r.second,3:!!r.third};
      for(var b=1;b<=3;b++){
        if(occ[b]&&!bases[b]) bases[b]="?";      // いるはずなのに名前不明
        if(!occ[b]) bases[b]=null;               // いないなら消す
      }
      // この打席の表示用にコピー
      ab._runnerNames={1:bases[1],2:bases[2],3:bases[3]};

      // 打席結果を反映して次の状態を作る
      var rs=ab.result_summary||"";
      var name=(ab.batter&&ab.batter.name)?ab.batter.name.split(/\s+/)[0]:null;
      function advanceAll(n){
        for(var i=3;i>=1;i--){
          if(bases[i]){
            var to=i+n;
            if(to<=3) bases[to]=bases[i];
            bases[i]=null;
          }
        }
      }
      if(/本塁打/.test(rs)){
        bases={1:null,2:null,3:null};
      }else if(/三塁打|3塁打|３塁打/.test(rs)){
        advanceAll(3); bases[3]=name;
      }else if(/二塁打|2塁打|２塁打/.test(rs)){
        advanceAll(2); bases[2]=name;
      }else if(/安打/.test(rs)&&!/併殺/.test(rs)){
        advanceAll(1); bases[1]=name;
      }else if(/四球|死球/.test(rs)){
        // 押し出し進塁（詰まっている塁だけ進む）
        if(bases[1]){
          if(bases[2]){
            if(bases[3]){/* 満塁: 三塁走者は生還扱い */ bases[3]=null;}
            bases[3]=bases[2];
          }
          bases[2]=bases[1];
        }
        bases[1]=name;
      }else if(/エラー/.test(rs)){
        advanceAll(1); bases[1]=name;
      }else if(/犠打|犠飛/.test(rs)){
        advanceAll(1);
      }else if(/併殺/.test(rs)){
        bases[1]=null; // 一塁走者アウト（代表的パターン）
      }
      // ゴロ・フライ・三振は走者そのまま
    });
  }

  /* ---- 配球チャート（ストライクゾーンに投球位置をプロット） ----
     コース座標は 0〜63px の範囲に分布。実データの検証から、
     ストライクゾーンは概ね top:10-58 / left:5-50 の内側。 */
  var CH={size:63, zTop:10, zBottom:58, zLeft:5, zRight:50};

  function buildChart(ab){
    var ps=(ab.pitches||[]).filter(function(p){
      return p.course&&p.course.top_px!=null&&p.course.left_px!=null;
    });
    if(!ps.length) return "";

    var V=100; // viewBox基準
    function sx(px){return px/CH.size*V;}
    // ゾーン枠の位置
    var zx=sx(CH.zLeft), zy=sx(CH.zTop),
        zw=sx(CH.zRight)-sx(CH.zLeft), zh=sx(CH.zBottom)-sx(CH.zTop);

    var s='<div class="chartbox"><svg class="chartsvg" viewBox="-8 -8 116 116">';
    // 外枠（ボールゾーン）
    s+='<rect x="-6" y="-6" width="112" height="112" rx="4" fill="var(--panel2)" stroke="var(--line)" stroke-width="1"/>';
    // ストライクゾーン
    s+='<rect x="'+zx+'" y="'+zy+'" width="'+zw+'" height="'+zh+'" fill="var(--zone)" stroke="var(--accent)" stroke-width="1.6"/>';
    // 3x3の区切り線
    for(var i=1;i<3;i++){
      s+='<line x1="'+(zx+zw*i/3)+'" y1="'+zy+'" x2="'+(zx+zw*i/3)+'" y2="'+(zy+zh)+'" stroke="var(--accent)" stroke-width=".5" opacity=".45"/>';
      s+='<line x1="'+zx+'" y1="'+(zy+zh*i/3)+'" x2="'+(zx+zw)+'" y2="'+(zy+zh*i/3)+'" stroke="var(--accent)" stroke-width=".5" opacity=".45"/>';
    }
    // 投球をプロット
    ps.forEach(function(p){
      var cx=sx(p.course.left_px), cy=sx(p.course.top_px);
      var fill="var(--panel)",stroke="var(--muted)",tc="var(--ink)";
      if(p.kind==="ball"){fill="#40C057";stroke="#2B8A3E";tc="#fff";}
      else if(p.kind==="strike"){fill="#FAB005";stroke="#E67700";tc="#3D2510";}
      else if(p.kind==="hit"){fill="var(--accent)";stroke="var(--accent)";tc="#fff";}
      else if(p.kind==="out"){fill="#1C7ED6";stroke="#1864AB";tc="#fff";}
      s+='<circle cx="'+cx+'" cy="'+cy+'" r="7.5" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.4"/>';
      s+='<text x="'+cx+'" y="'+(cy+2.9)+'" text-anchor="middle" font-size="8.5" '+
         'font-family="Roboto Mono,monospace" font-weight="700" fill="'+tc+'">'+(p.no||"")+'</text>';
    });
    s+='</svg>';
    // 凡例
    s+='<div class="charttxt"><div class="charttitle">配球チャート</div>'+
       '<div class="lg"><span class="lgd" style="background:#FAB005"></span>ストライク</div>'+
       '<div class="lg"><span class="lgd" style="background:#40C057"></span>ボール</div>'+
       '<div class="lg"><span class="lgd" style="background:var(--accent)"></span>安打</div>'+
       '<div class="lg"><span class="lgd" style="background:#1C7ED6"></span>凡打</div>'+
       '<div class="chartnote">投手から見た位置</div></div>';
    s+='</div>';
    return s;
  }

  /* 打球方向フィールド図 */
  function buildField(ab){
    var d=ab.hit_direction||{};
    if(!d.dir) return "";
    var x=d.x,y=d.y;
    // SVG座標に変換（viewBox 0 0 100 84、ホームは(50,76)）
    var hx=50,hy=76;
    var s='<div class="fieldbox"><svg class="fieldsvg" viewBox="0 0 100 84">'+
      '<path d="M50 78 L4 32 A62 62 0 0 1 96 32 Z" fill="var(--field)" opacity=".5"/>'+
      '<path d="M50 78 L26 54 A34 34 0 0 1 74 54 Z" fill="var(--dirt)" opacity=".55"/>'+
      '<polygon points="50,74 62,62 50,50 38,62" fill="none" stroke="var(--field2)" stroke-width="1.6"/>'+
      '<line x1="'+hx+'" y1="'+hy+'" x2="'+x+'" y2="'+y+'" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round"/>'+
      '<circle cx="'+x+'" cy="'+y+'" r="4.5" fill="var(--accent)"/>'+
      '<circle cx="'+hx+'" cy="'+hy+'" r="2.6" fill="var(--ink)"/>'+
      '</svg><div class="fieldtxt">打球方向<br><b>'+esc(d.dir_name||"")+'</b>方向<br>'+
      '<span style="font-size:11px;color:var(--muted)">'+esc(ab.result_summary||"")+'</span></div></div>';
    return s;
  }

  async function loadGame(d,gid,el){
    var l=document.querySelectorAll(".game"),i;
    for(i=0;i<l.length;i++) l[i].classList.remove("on");
    if(el) el.classList.add("on");
    detailEl.innerHTML='<div class="msg">読み込み中…</div>';
    try{
      var r=await fetch(gamePath(d,gid)+"?t="+Date.now());
      curGame=await r.json();
      inferRunnerNames(curGame.atbats||[]);
      curTab="summary";
      pitchFilter={pitcher:"all", type:"all"};
      render();
      detailEl.scrollIntoView({behavior:"smooth",block:"start"});
    }catch(e){
      detailEl.innerHTML='<div class="msg">読み込みに失敗しました</div>';
    }
  }

  /* ===== タブ制御 ===== */
  var curTab = "summary";

  function setTab(t){
    curTab = t;
    render();
  }

  function render(){
    var g=curGame;if(!g) return;
    var tabs=[["summary","概要"],["batting","打撃"],["pitching","投手"],
              ["analysis","配球"],["pitches","全打席"]];
    var h='<div class="tabs">';
    tabs.forEach(function(t){
      h+='<button class="tab'+(curTab===t[0]?' on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';
    });
    h+='</div><div id="tabbody"></div>';
    detailEl.innerHTML=h;

    var body=document.getElementById("tabbody");
    if(curTab==="summary") body.innerHTML=renderSummary(g);
    else if(curTab==="batting") body.innerHTML=renderBatting(g);
    else if(curTab==="pitching") body.innerHTML=renderPitching(g);
    else if(curTab==="analysis") body.innerHTML=renderAnalysis(g);
    else renderPitches();
  }

  /* ===== 概要タブ ===== */
  function renderSummary(g){
    var h=buildBoard(g);
    var res=g.result||{};

    var pit=[];

  /* ===== 投手成績タブ ===== */
  function renderPitching(g){
    var box=g.boxscore;
    if(!box||!box.pitching) return notReady("投手成績");
    var h="";
    [["away",g.away],["home",g.home]].forEach(function(x){
      var side=x[0],team=x[1];
      var rows=box.pitching[side]||[];
      if(!rows.length) return;
      h+='<div class="card2"><h3>'+esc(team||side)+'</h3><div class="tblwrap"><table class="stbl">'+
         '<thead><tr><th></th><th class="nm">選手</th><th>防御率</th><th>回</th><th>球数</th>'+
         '<th>被安</th><th>被本</th><th>奪三</th><th>四球</th><th>失点</th><th>自責</th></tr></thead><tbody>';
      rows.forEach(function(p){

        h+='<tr><td><span class="dec '+dcls+'">'+esc(dec)+'</span></td>'+

           '<td class="num">'+esc(p.innings)+'</td>'+

           '<td class="num">'+p.hr_allowed+'</td>'+

           '<td class="num">'+p.bb+'</td>'+

  function notReady(name){
    return '<div class="msg">'+name+'はこの試合のデータにまだ含まれていません<br>'+
      '<span style="font-size:12px">Actionsで再収集すると取得できます</span></div>';
  }
  function fmtAvg(v){
    if(v==null) return "-";
    return v.toFixed(3).replace(/^0\./,".");
  }

  /* ===== 配球分析タブ ===== */
  var pitchFilter = {pitcher:"all", type:"all"};

  function collectPitches(g){
    // 全投球をフラットな配列にする（投手・打者・状況つき）
    var out=[];
    (g.atbats||[]).forEach(function(ab){
      var p=ab.pitcher||{}, b=ab.batter||{};
      (ab.pitches||[]).forEach(function(pt){
        out.push({
          pitcher: p.name||"-", pitcher_id: p.player_id,
          batter: b.name||"-", bhand: b.hand||"",
          inning: ab.inning, tb: ab.top_bottom,
          type: pt.type||"不明", speed: pt.speed_kmh,
          result: pt.result||"", kind: pt.kind||"",
          course: pt.course||null,
          last: false
        });
      });
      // 打席の最終球に印
      if(out.length && (ab.pitches||[]).length) out[out.length-1].last=true;
    });
    return out;
  }

  function renderAnalysis(g){
    var all=collectPitches(g);
    if(!all.length) return notReady("配球データ");

    // 投手の一覧（投球数順）
    var byPitcher={};
    all.forEach(function(p){byPitcher[p.pitcher]=(byPitcher[p.pitcher]||0)+1;});
    var pitchers=Object.keys(byPitcher).sort(function(a,b){return byPitcher[b]-byPitcher[a];});

    // フィルタ適用
    var ps=all.filter(function(p){
      if(pitchFilter.pitcher!=="all" && p.pitcher!==pitchFilter.pitcher) return false;
      if(pitchFilter.type!=="all" && p.type!==pitchFilter.type) return false;
      return true;
    });

    // 球種一覧
    var types={};
    all.forEach(function(p){types[p.type]=(types[p.type]||0)+1;});
    var typeList=Object.keys(types).sort(function(a,b){return types[b]-types[a];});

    var h='<div class="toolbar">'+
      '<span class="lb">投手</span><select id="fp" onchange="onAnalysisFilter()">'+
      '<option value="all">全投手</option>'+
      pitchers.map(function(n){
        return '<option value="'+esc(n)+'"'+(pitchFilter.pitcher===n?" selected":"")+'>'+
               esc(n)+' ('+byPitcher[n]+')</option>';
      }).join("")+
      '</select>'+
      '<span class="lb">球種</span><select id="ft" onchange="onAnalysisFilter()">'+
      '<option value="all">全球種</option>'+
      typeList.map(function(t){
        return '<option value="'+esc(t)+'"'+(pitchFilter.type===t?" selected":"")+'>'+
               esc(t)+'</option>';
      }).join("")+
      '</select></div>';

    if(!ps.length) return h+'<div class="msg">該当する投球がありません</div>';

    // --- 球種割合 ---
    var tcount={};
    ps.forEach(function(p){tcount[p.type]=(tcount[p.type]||0)+1;});
    var tkeys=Object.keys(tcount).sort(function(a,b){return tcount[b]-tcount[a];});
    h+='<div class="card2"><h3>球種割合（'+ps.length+'球）</h3>';
    tkeys.forEach(function(t){
      var n=tcount[t], pct=Math.round(n/ps.length*1000)/10;
      // その球種の平均球速
      var sp=ps.filter(function(x){return x.type===t&&x.speed;});
      var avg=sp.length?Math.round(sp.reduce(function(s,x){return s+x.speed;},0)/sp.length):null;
      h+='<div class="bar-row"><div class="bar-lb">'+esc(t)+'</div>'+
         '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+
         '<div class="bar-val">'+pct+'% <span class="sub2">'+n+'球'+
         (avg?' / 平均'+avg+'km/h':'')+'</span></div></div>';
    });
    h+='</div>';

    // --- 球速 ---
    var speeds=ps.filter(function(p){return p.speed;}).map(function(p){return p.speed;});
    if(speeds.length){
      var mx=Math.max.apply(null,speeds), mn=Math.min.apply(null,speeds);
      var av=Math.round(speeds.reduce(function(a,b){return a+b;},0)/speeds.length);
      h+='<div class="card2"><h3>球速</h3><div class="statrow">'+
        '<div class="stat"><div class="sv">'+mx+'</div><div class="sl">最速 km/h</div></div>'+
        '<div class="stat"><div class="sv">'+av+'</div><div class="sl">平均 km/h</div></div>'+
        '<div class="stat"><div class="sv">'+mn+'</div><div class="sl">最遅 km/h</div></div>'+
        '</div></div>';
    }

    // --- コースヒートマップ（5×5） ---
    h+='<div class="card2"><h3>コース分布（投手から見た位置）</h3>'+buildHeatmap(ps)+'</div>';

    // --- 結果別の投球 ---
    var kinds={strike:"ストライク系",ball:"ボール",hit:"安打",out:"凡打",bunt:"犠打"};
    var kc={};
    ps.forEach(function(p){if(p.kind) kc[p.kind]=(kc[p.kind]||0)+1;});
    var kk=Object.keys(kc);
    if(kk.length){
      h+='<div class="card2"><h3>投球結果の内訳</h3><div class="statrow">';
      kk.forEach(function(k){
        h+='<div class="stat"><div class="sv">'+kc[k]+'</div><div class="sl">'+(kinds[k]||k)+'</div></div>';
      });
      h+='</div></div>';
    }

    return h;
  }

  function onAnalysisFilter(){
    var fp=document.getElementById("fp"), ft=document.getElementById("ft");
    if(fp) pitchFilter.pitcher=fp.value;
    if(ft) pitchFilter.type=ft.value;
    document.getElementById("tabbody").innerHTML=renderAnalysis(curGame);
  }

  /* 5×5ヒートマップ */
  function buildHeatmap(ps){
    var grid={}, max=0;
    ps.forEach(function(p){
      var c=p.course;
      if(!c||c.grid_row==null||c.grid_col==null) return;
      var k=c.grid_row+"-"+c.grid_col;
      grid[k]=(grid[k]||0)+1;
      if(grid[k]>max) max=grid[k];
    });
    if(!max) return '<div class="sub">コースデータがありません</div>';

    var h='<div class="heat">';
    for(var r=0;r<5;r++){
      for(var c=0;c<5;c++){
        var n=grid[r+"-"+c]||0;
        var ratio=max?n/max:0;
        // ストライクゾーン（中央3x3）に枠
        var inZone=(r>=1&&r<=3&&c>=1&&c<=3);
        h+='<div class="hcell'+(inZone?' zone':'')+'" '+
           'style="background:rgba(232,89,12,'+(ratio*0.85).toFixed(2)+')" '+
           'title="'+n+'球">'+(n||"")+'</div>';
      }
    }
    h+='</div><div class="heat-lg"><span>少</span>'+
       '<span class="hgrad"></span><span>多</span>'+
       '<span style="margin-left:auto">枠内＝ストライクゾーン</span></div>';
    return h;
  }

  /* ===== 全打席タブ（従来の一球表示） ===== */
  function renderPitches(){
    var g=curGame;if(!g) return;
    var fe=document.getElementById("flt");
    var fv=fe?fe.value:"all";
    var body=document.getElementById("tabbody");

    var h='<div class="toolbar"><span class="lb">表示</span>'+
       '<select id="flt" onchange="renderPitches()">'+
         '<option value="all">全打席</option>'+
         '<option value="'+esc(g.away)+'">'+esc(g.away)+' の攻撃</option>'+
         '<option value="'+esc(g.home)+'">'+esc(g.home)+' の攻撃</option>'+
         '<option value="score">得点した打席</option>'+
         '<option value="hit">安打・本塁打</option>'+
       '</select>'+
       '<button class="btn" onclick="toggleAll(true)">全部ひらく</button>'+
       '<button class="btn" onclick="toggleAll(false)">全部とじる</button></div>';

    var groups={},order=[];
    (g.atbats||[]).forEach(function(ab){
      var rs=ab.result_summary||"";
      if(fv==="score" && !/＋\d+点/.test(rs)) return;
      if(fv==="hit" && !/安打|本塁打|塁打/.test(rs)) return;
      if(fv!=="all"&&fv!=="score"&&fv!=="hit"&&ab.batting_team!==fv) return;
      var k=ab.inning+"-"+ab.top_bottom;
      if(!groups[k]){groups[k]=[];order.push(k);}
      groups[k].push(ab);
    });

    if(!order.length){
      body.innerHTML=h+'<div class="msg">該当する打席がありません</div>';
      var s0=document.getElementById("flt");if(s0)s0.value=fv;
      return;
    }

    order.forEach(function(k,gi){
      var abs=groups[k],first=abs[0],pts=0,np=0;
      abs.forEach(function(a){
        var m=/＋(\d+)点/.exec(a.result_summary||"");
        if(m) pts+=parseInt(m[1],10);
        np+=(a.pitch_count||0);
      });
      h+='<div class="inn'+(gi<2?' open':'')+'" id="inn-'+first.inning+'-'+first.top_bottom+'">'+
        '<div class="inn-h" onclick="this.parentNode.classList.toggle(\'open\')">'+
          '<div><span class="inn-t">'+first.inning+'回'+first.top_bottom+'</span> '+
          '<span class="inn-m">'+esc(first.batting_team||"")+' の攻撃</span></div>'+
          '<div><span class="inn-m">'+abs.length+'打席 / '+np+'球'+
          (pts?' <b style="color:var(--accent)">'+pts+'点</b>':'')+'</span> '+
          '<span class="caret">▶</span></div></div><div class="inn-b">';

      abs.forEach(function(ab){
        var b=ab.batter||{},p=ab.pitcher||{},r=ab.runners||{};
        // 走者表示（推定名つき）
        var rn=ab._runnerNames||{};
        var rparts=[];
        if(r.first) rparts.push("一塁 "+(rn[1]&&rn[1]!=="?"?rn[1]:"?"));
        if(r.second) rparts.push("二塁 "+(rn[2]&&rn[2]!=="?"?rn[2]:"?"));
        if(r.third) rparts.push("三塁 "+(rn[3]&&rn[3]!=="?"?rn[3]:"?"));
        var rtext=rparts.length?rparts.join(" ／ ")+' <span style="font-size:10px;color:var(--muted)">(推定)</span>':"走者なし";
        h+='<div class="ab"><div class="ab-h"><div class="ab-p">'+
          '<span class="lbl">打者</span> <b>'+esc(b.name||"-")+'</b> '+
          '<span class="no">'+(b.number?"#"+b.number:"")+'</span> '+
          '<span class="lbl">'+esc(b.hand||"")+'</span><br>'+
          '<span class="lbl">投手</span> <b>'+esc(p.name||"-")+'</b> '+
          '<span class="no">'+(p.number?"#"+p.number:"")+'</span> '+
          '<span class="lbl">'+esc(p.hand||"")+'</span><br>'+
          '<span class="lbl">走者</span> <span style="font-size:12px">'+rtext+'</span><br>'+
          '<span class="res '+rcls(ab.result_summary)+'">'+esc(ab.result_summary||"")+'</span>'+
          '</div>'+buildSitu(ab)+'</div>';
        h+=buildChart(ab);
        h+=buildField(ab);
        (ab.pitches||[]).forEach(function(pt){
          var c=(pt.course&&pt.course.label)?pt.course.label:"-";
          var kc=pt.kind?(" k-"+pt.kind):"";
          h+='<div class="pt"><div class="pt-n'+kc+'">'+(pt.no==null?"":pt.no)+'</div>'+
            '<div><span class="pt-t">'+esc(pt.type||"")+'</span> '+
            '<span class="pt-s">'+(pt.speed_kmh?pt.speed_kmh+"km/h":"")+'</span>'+
            '<div class="pt-c">'+esc(c)+'</div></div>'+
            '<div class="pt-r '+rcls(pt.result)+'">'+esc(pt.result||"")+'</div></div>';
        });
        h+='</div>';
      });
      h+='</div></div>';
    });

    body.innerHTML=h;
    var sel=document.getElementById("flt");if(sel) sel.value=fv;
  }

  function toggleAll(open){
    var l=document.querySelectorAll(".inn"),i;
    for(i=0;i<l.length;i++){
      if(open) l[i].classList.add("open"); else l[i].classList.remove("open");
    }
  }
  function fmtDate(t){
    var y=t.getFullYear();
    var m=("0"+(t.getMonth()+1)).slice(-2);
    var d=("0"+t.getDate()).slice(-2);
    return y+"-"+m+"-"+d;
  }
  function shift(n){
    var t=new Date(dp.value+"T00:00:00");
    t.setDate(t.getDate()+n);
    dp.value=fmtDate(t);
    loadDay();
  }
  function today(){dp.value=todayJST();loadDay();}
  dp.addEventListener("change",loadDay);
  today();
</script>
</body>
</html>
