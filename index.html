<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPB SCOREBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F0A;
    --panel:#111811;
    --panel2:#0D140D;
    --line:#1E2C1E;
    --amber:#FFB627;
    --amber-dim:#8A6415;
    --green:#4ADE5C;
    --red:#FF4D3D;
    --white:#E8EDE4;
    --muted:#5F7A5F;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'DotGothic16',monospace;
    background:var(--bg);
    color:var(--white);
    min-height:100vh;
    background-image:repeating-linear-gradient(
      0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 3px);
  }
  .wrap{max-width:820px;margin:0 auto;padding:0 14px;}

  .hero{border-bottom:3px double var(--line);padding:22px 0 18px;text-align:center;}
  .hero .sub{font-size:11px;letter-spacing:.4em;color:var(--muted);}
  .hero h1{
    font-size:clamp(22px,6vw,34px);
    color:var(--amber);letter-spacing:.14em;margin:6px 0 4px;
    text-shadow:0 0 12px rgba(255,182,39,.45);
  }
  .lamp{
    display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--red);box-shadow:0 0 8px var(--red);
    margin:0 8px;vertical-align:middle;
  }

  .panel{background:var(--panel);border:2px solid var(--line);border-radius:4px;padding:14px;margin-top:16px;}
  .plabel{font-size:11px;color:var(--muted);letter-spacing:.2em;margin-bottom:8px;}
  .daterow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  input[type=date]{
    font-family:inherit;font-size:16px;
    background:var(--panel2);color:var(--amber);
    border:2px solid var(--line);border-radius:3px;
    padding:9px 10px;flex:1 1 150px;min-width:140px;color-scheme:dark;
  }
  .btn{
    font-family:inherit;font-size:12px;letter-spacing:.08em;
    background:var(--panel2);color:var(--white);
    border:2px solid var(--line);border-radius:3px;
    padding:9px 13px;cursor:pointer;
  }
  .btn:hover{border-color:var(--amber);color:var(--amber);}
  .btn:active{background:var(--amber);color:var(--bg);}
  .path{
    margin-top:10px;font-size:11px;color:var(--amber-dim);
    background:var(--panel2);border:1px solid var(--line);
    padding:6px 9px;overflow-x:auto;white-space:nowrap;
  }

  .games{margin-top:16px;display:flex;flex-direction:column;gap:9px;}
  .game{
    background:var(--panel);border:2px solid var(--line);
    border-left:5px solid var(--amber-dim);
    padding:13px 14px;cursor:pointer;
  }
  .game:hover{border-left-color:var(--amber);background:var(--panel2);}
  .game.on{border-left-color:var(--green);}
  .gcard{font-size:17px;color:var(--white);letter-spacing:.06em;}
  .gmeta{font-size:11px;color:var(--muted);margin-top:5px;}

  .detail{margin-top:14px;}
  .dhead{
    background:var(--panel2);border:2px solid var(--line);
    padding:11px 14px;font-size:16px;color:var(--amber);letter-spacing:.1em;
  }
  .inning{border:2px solid var(--line);border-top:none;background:var(--panel);}
  .ihead{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:9px 14px;background:var(--panel2);
    border-bottom:1px solid var(--line);font-size:13px;
  }
  .ino{color:var(--green);letter-spacing:.1em;}
  .ires{color:var(--amber);font-size:12px;text-align:right;}
  .players{
    padding:8px 14px;font-size:12px;color:var(--muted);
    border-bottom:1px dashed var(--line);line-height:1.7;
  }
  .players b{color:var(--white);font-weight:normal;}
  .pnum{color:var(--amber-dim);font-size:11px;}
  .pitches{padding:6px 0;}
  .pitch{display:grid;grid-template-columns:26px 1fr auto;gap:10px;align-items:center;padding:6px 14px;}
  .pitch:nth-child(odd){background:rgba(255,255,255,.015);}
  .pno{
    width:22px;height:22px;line-height:20px;text-align:center;
    background:var(--panel2);border:1px solid var(--amber-dim);
    color:var(--amber);font-size:11px;
  }
  .ptype{font-size:13px;color:var(--white);}
  .pspeed{color:var(--green);font-size:13px;}
  .pcourse{font-size:10px;color:var(--muted);letter-spacing:.05em;}
  .presult{font-size:12px;color:var(--white);text-align:right;}
  .presult.hit{color:var(--amber);}
  .presult.out{color:var(--red);}

  .msg{
    border:2px dashed var(--line);padding:26px 14px;text-align:center;
    color:var(--muted);font-size:13px;margin-top:16px;line-height:1.9;
  }
  .note{
    margin:18px 0 40px;padding:12px;border-top:1px solid var(--line);
    font-size:11px;color:var(--muted);line-height:1.9;
  }
  .blink{animation:bl 1.2s steps(2,start) infinite;}
  @keyframes bl{to{opacity:.35;}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="sub">NIPPON PROFESSIONAL BASEBALL</div>
      <h1><span class="lamp"></span>SCOREBOARD<span class="lamp"></span></h1>
      <div class="sub">PITCH BY PITCH DATA</div>
    </div>

    <div class="panel">
      <div class="plabel">▼ DATE SELECT</div>
      <div class="daterow">
        <input type="date" id="dp">
        <button class="btn" onclick="shift(-1)">◀ PREV</button>
        <button class="btn" onclick="today()">TODAY</button>
        <button class="btn" onclick="shift(1)">NEXT ▶</button>
      </div>
      <div class="path" id="path"></div>
    </div>

    <div id="games" class="games"></div>
    <div id="detail" class="detail"></div>

    <div class="note">
      ▸ データは毎晩 JST 23時台に自動収集。過去の日付は GitHub Actions の
      「Run workflow」で日付を指定して収集できます。<br>
      ▸ コース表記（高め・外 など）は配球図の座標を5×5に近似した目安です。
    </div>
  </div>

<script>
  const dp=document.getElementById("dp");
  const pathEl=document.getElementById("path");
  const gamesEl=document.getElementById("games");
  const detailEl=document.getElementById("detail");

  function todayJST(){return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10);}
  function sumPath(d){const p=d.split("-");return "data/"+p[0]+"/"+p[1]+"/"+p[2]+"/_summary.json";}
  function gamePath(d,g){const p=d.split("-");return "data/"+p[0]+"/"+p[1]+"/"+p[2]+"/"+g+".json";}
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");}

  function resultClass(r){
    if(!r) return "";
    if(/安打|本塁打|二塁打|三塁打|適時/.test(r)) return "hit";
    if(/三振|ゴロ|フライ|併殺|邪飛|直/.test(r)) return "out";
    return "";
  }

  async function loadDay(){
    const d=dp.value;
    pathEl.textContent="▸ "+sumPath(d);
    gamesEl.innerHTML='<div class="msg blink">LOADING...</div>';
    detailEl.innerHTML="";
    try{
      const r=await fetch(sumPath(d)+"?t="+Date.now());
      if(!r.ok) throw 0;
      const s=await r.json();
      if(!s.games||!s.games.length) throw 0;
      gamesEl.innerHTML="";
      s.games.forEach(function(g){
        const el=document.createElement("div");
        el.className="game";
        el.innerHTML='<div class="gcard">'+esc(g.card||("GAME "+g.game_id))+'</div>'+
          '<div class="gmeta">'+g.atbat_count+' AB / '+g.pitch_count+' PITCH ▸ TAP TO OPEN</div>';
        el.onclick=function(){loadGame(d,g.game_id,el);};
        gamesEl.appendChild(el);
      });
    }catch(e){
      gamesEl.innerHTML='<div class="msg">NO DATA<br>この日のデータはまだありません</div>';
    }
  }

  async function loadGame(d,gid,el){
    const list=document.querySelectorAll(".game");
    for(let i=0;i<list.length;i++) list[i].classList.remove("on");
    if(el) el.classList.add("on");
    detailEl.innerHTML='<div class="msg blink">LOADING...</div>';
    try{
      const r=await fetch(gamePath(d,gid)+"?t="+Date.now());
      const g=await r.json();
      let h='<div class="dhead">'+esc(g.card||gid)+'</div>';
      (g.atbats||[]).forEach(function(ab){
        const b=ab.batter||{},p=ab.pitcher||{};
        h+='<div class="inning"><div class="ihead">'+
          '<span class="ino">'+ab.inning+'回'+ab.top_bottom+
            (ab.batting_team?'　'+esc(ab.batting_team)+' 攻撃':'')+'</span>'+
          '<span class="ires">'+esc(ab.result_summary||"")+'</span></div>'+
          '<div class="players">打者 <b>'+esc(b.name||"-")+'</b> '+
            '<span class="pnum">'+(b.number?"#"+b.number:"")+' '+esc(b.hand||"")+'</span>'+
            ' ／ 投手 <b>'+esc(p.name||"-")+'</b> '+
            '<span class="pnum">'+(p.number?"#"+p.number:"")+' '+esc(p.hand||"")+'</span></div>'+
          '<div class="pitches">';
        (ab.pitches||[]).forEach(function(pt){
          const c=(pt.course&&pt.course.label)?pt.course.label:"-";
          h+='<div class="pitch"><div class="pno">'+(pt.no==null?"":pt.no)+'</div>'+
            '<div><span class="ptype">'+esc(pt.type||"")+'</span> '+
            '<span class="pspeed">'+(pt.speed_kmh?pt.speed_kmh+"km/h":"")+'</span>'+
            '<div class="pcourse">'+esc(c)+'</div></div>'+
            '<div class="presult '+resultClass(pt.result)+'">'+esc(pt.result||"")+'</div></div>';
        });
        h+='</div></div>';
      });
      detailEl.innerHTML=h;
    }catch(e){
      detailEl.innerHTML='<div class="msg">LOAD ERROR</div>';
    }
  }

  function shift(n){
    const t=new Date(dp.value+"T00:00:00");
    t.setDate(t.getDate()+n);
    dp.value=t.toISOString().slice(0,10);
    loadDay();
  }
  function today(){dp.value=todayJST();loadDay();}
  dp.addEventListener("change",loadDay);
  today();
</script>
</body>
</html>
