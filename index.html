<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPB SCOREBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+1p:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ===== ライトモード（既定） ===== */
  :root{
    --bg:#FFF9F0;
    --panel:#FFFFFF;
    --panel2:#FFF4E3;
    --line:#F0D9B5;
    --line2:#E5C596;
    --ink:#3D2510;          /* 本文（濃い茶）読みやすさ優先 */
    --ink2:#6B4A28;
    --muted:#9A7B57;
    --accent:#E8590C;       /* オレンジ */
    --accent2:#F59F00;      /* 黄 */
    --gold:#FFC93C;
    --hit:#D9480F;
    --out:#1C7ED6;
    --board-bg:#2B1B0E;     /* スコアボードは常に暗色 */
    --board-ink:#FFD43B;
    --board-line:#5A4028;
    --shadow:0 2px 10px rgba(120,70,20,.10);
  }
  /* ===== ダークモード ===== */
  [data-theme="dark"]{
    --bg:#1A1208;
    --panel:#241809;
    --panel2:#2E1F0D;
    --line:#3D2A13;
    --line2:#54391B;
    --ink:#FFF0DB;
    --ink2:#E8CFA8;
    --muted:#A98858;
    --accent:#FF922B;
    --accent2:#FFC93C;
    --gold:#FFD43B;
    --hit:#FFA94D;
    --out:#74C0FC;
    --board-bg:#120C05;
    --board-ink:#FFD43B;
    --board-line:#3D2A13;
    --shadow:0 2px 10px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'M PLUS 1p',sans-serif;
    background:var(--bg);color:var(--ink);
    min-height:100vh;font-size:15px;line-height:1.6;
    transition:background .2s,color .2s;
  }
  .dot{font-family:'DotGothic16',monospace;}
  .wrap{max-width:900px;margin:0 auto;padding:0 14px 60px;}

  /* ---- ヘッダ ---- */
  .hero{
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
    padding:18px 0 16px;margin-bottom:16px;
    position:relative;overflow:hidden;
  }
  .hero-in{max-width:900px;margin:0 auto;padding:0 14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .hero h1{
    font-family:'DotGothic16',monospace;
    font-size:clamp(20px,5vw,28px);color:#fff;letter-spacing:.1em;
    text-shadow:0 2px 6px rgba(120,50,0,.35);
  }
  .hero p{font-size:11px;color:rgba(255,255,255,.9);letter-spacing:.15em;}
  .theme-btn{
    background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.55);
    color:#fff;font-family:inherit;font-size:19px;font-weight:700;
    width:42px;height:42px;border-radius:10px;cursor:pointer;flex-shrink:0;
  }
  .theme-btn:hover{background:rgba(255,255,255,.34);}

  /* ---- 日付バー ---- */
  .datebar{
    background:var(--panel);border:2px solid var(--line);
    border-radius:12px;padding:12px;box-shadow:var(--shadow);
  }
  .drow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  input[type=date]{
    font-family:inherit;font-size:16px;font-weight:700;
    background:var(--panel2);color:var(--ink);
    border:2px solid var(--line2);border-radius:9px;
    padding:9px 11px;flex:1 1 160px;min-width:150px;
  }
  [data-theme="dark"] input[type=date]{color-scheme:dark;}
  .btn{
    font-family:inherit;font-size:13px;font-weight:700;
    background:var(--panel2);color:var(--accent);
    border:2px solid var(--line2);border-radius:9px;
    padding:9px 13px;cursor:pointer;white-space:nowrap;
  }
  .btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* ---- 試合カード ---- */
  .games{margin-top:14px;display:grid;gap:10px;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));}
  .game{
    background:var(--panel);border:2px solid var(--line);
    border-radius:12px;padding:13px 15px;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .12s,border-color .12s;
  }
  .game:hover{border-color:var(--accent);transform:translateY(-2px);}
  .game.on{border-color:var(--accent);background:var(--panel2);}
  .gcard{font-size:17px;font-weight:900;color:var(--ink);}
  .gmeta{font-size:11.5px;color:var(--muted);margin-top:4px;}

  /* ---- スコアボード ---- */
  .board{
    background:var(--board-bg);border-radius:12px;
    padding:12px;margin-top:16px;overflow-x:auto;
    box-shadow:var(--shadow);
  }
  table.sb{border-collapse:collapse;width:100%;min-width:420px;
    font-family:'DotGothic16',monospace;}
  table.sb th,table.sb td{
    border:1px solid var(--board-line);
    padding:6px 4px;text-align:center;min-width:26px;
    color:var(--board-ink);font-size:15px;
  }
  table.sb th{font-size:12px;color:#C9A227;}
  table.sb td.team{
    text-align:left;padding-left:10px;min-width:100px;
    font-family:'M PLUS 1p',sans-serif;font-weight:700;
    font-size:14px;color:#FFF3D6;white-space:nowrap;
  }
  table.sb td.total{color:#fff;font-weight:700;background:rgba(255,212,59,.12);}
  table.sb .win{color:#FFD43B;}

  /* ---- 操作バー ---- */
  .toolbar{
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    margin-top:14px;padding:11px 13px;
    background:var(--panel);border:2px solid var(--line);
    border-radius:12px;box-shadow:var(--shadow);
  }
  .toolbar .lb{font-size:12px;color:var(--muted);font-weight:700;}
  select{
    font-family:inherit;font-size:13px;font-weight:700;
    background:var(--panel2);color:var(--ink);
    border:2px solid var(--line2);border-radius:9px;
    padding:7px 9px;cursor:pointer;
  }

  /* ---- イニング ---- */
  .inn{
    margin-top:12px;background:var(--panel);
    border:2px solid var(--line);border-radius:12px;
    overflow:hidden;box-shadow:var(--shadow);
  }
  .inn-h{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:11px 14px;cursor:pointer;background:var(--panel2);
  }
  .inn-h:hover{background:var(--line);}
  .inn-t{font-size:15px;font-weight:900;color:var(--accent);}
  .inn-m{font-size:11.5px;color:var(--muted);font-weight:500;}
  .caret{color:var(--accent);font-size:13px;transition:transform .15s;}
  .inn.open .caret{transform:rotate(90deg);}
  .inn-b{display:none;}
  .inn.open .inn-b{display:block;}

  /* ---- 打席 ---- */
  .ab{border-top:2px solid var(--line);}
  .ab-h{
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
    padding:10px 14px;background:var(--panel);
  }
  .ab-p{font-size:13.5px;line-height:1.7;}
  .ab-p b{font-weight:900;color:var(--ink);}
  .ab-p .lbl{color:var(--muted);font-size:11.5px;}
  .no{font-family:'DotGothic16',monospace;color:var(--accent2);font-size:11.5px;}
  .res{
    font-size:12.5px;font-weight:900;color:#fff;background:var(--accent);
    padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;
  }
  .res.hit{background:var(--hit);}
  .res.out{background:var(--out);}

  .pt{
    display:grid;grid-template-columns:26px 1fr auto;gap:10px;
    align-items:center;padding:7px 14px;border-top:1px dashed var(--line);
  }
  .pt-n{
    width:24px;height:24px;line-height:22px;text-align:center;
    font-family:'DotGothic16',monospace;font-size:12px;
    border-radius:50%;background:var(--panel2);
    border:2px solid var(--line2);color:var(--accent);
  }
  .pt-t{font-size:14px;font-weight:700;}
  .pt-s{font-family:'DotGothic16',monospace;color:var(--accent);font-size:14px;}
  .pt-c{font-size:11px;color:var(--muted);}
  .pt-r{font-size:12.5px;text-align:right;color:var(--ink2);font-weight:700;}
  .pt-r.hit{color:var(--hit);}
  .pt-r.out{color:var(--out);}

  .msg{
    margin-top:16px;padding:30px 14px;text-align:center;
    border:2px dashed var(--line2);border-radius:12px;
    color:var(--muted);font-size:14px;line-height:2;
  }
  .foot{margin-top:22px;font-size:11.5px;color:var(--muted);line-height:1.9;
    border-top:2px solid var(--line);padding-top:12px;}
  @media(max-width:520px){
    .games{grid-template-columns:1fr;}
    .pt{grid-template-columns:24px 1fr;}
    .pt-r{grid-column:2;text-align:left;padding-top:2px;}
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="hero-in">
      <div>
        <h1>NPB SCOREBOARD</h1>
        <p>PITCH BY PITCH DATA</p>
      </div>
      <button class="theme-btn" id="tb" onclick="toggleTheme()" title="ライト／ダーク切替">◐</button>
    </div>
  </div>

  <div class="wrap">
    <div class="datebar">
      <div class="drow">
        <input type="date" id="dp">
        <button class="btn" onclick="shift(-1)">◀ 前日</button>
        <button class="btn primary" onclick="today()">今日</button>
        <button class="btn" onclick="shift(1)">翌日 ▶</button>
      </div>
    </div>

    <div id="games" class="games"></div>
    <div id="detail"></div>

    <div class="foot">
      ▸ データは毎晩 JST 23時台に自動収集。過去の日付は GitHub Actions の「Run workflow」で収集できます。<br>
      ▸ コース表記は配球図の座標を5×5に近似した目安です。
    </div>
  </div>

<script>
  var dp=document.getElementById("dp"),
      gamesEl=document.getElementById("games"),
      detailEl=document.getElementById("detail"),
      curGame=null;

  /* ---- テーマ ---- */
  function applyTheme(t){
    if(t==="dark") document.documentElement.setAttribute("data-theme","dark");
    else document.documentElement.removeAttribute("data-theme");
    document.getElementById("tb").textContent = (t==="dark") ? "☀" : "☾";
    try{localStorage.setItem("npbTheme",t);}catch(e){}
  }
  function toggleTheme(){
    var cur=document.documentElement.getAttribute("data-theme")==="dark"?"dark":"light";
    applyTheme(cur==="dark"?"light":"dark");
  }
  (function(){
    var t="light";
    try{t=localStorage.getItem("npbTheme")||"light";}catch(e){}
    applyTheme(t);
  })();

  /* ---- ユーティリティ ---- */
  function todayJST(){return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10);}
  function sumPath(d){var p=d.split("-");return "data/"+p[0]+"/"+p[1]+"/"+p[2]+"/_summary.json";}
  function gamePath(d,g){var p=d.split("-");return "data/"+p[0]+"/"+p[1]+"/"+p[2]+"/"+g+".json";}
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
  function rcls(r){
    if(!r) return "";
    if(/本塁打|安打|二塁打|三塁打|適時|四球|死球/.test(r)) return "hit";
    if(/三振|ゴロ|フライ|併殺|邪飛|直|飛|犠/.test(r)) return "out";
    return "";
  }

  /* ---- 得点をイニング別に集計してスコアボードを作る ---- */
  function buildBoard(g){
    var maxInn=1,i;
    var away={},home={};
    (g.atbats||[]).forEach(function(ab){
      if(ab.inning>maxInn) maxInn=ab.inning;
      var m=/＋(\d+)点/.exec(ab.result_summary||"");
      var pts=m?parseInt(m[1],10):0;
      var t=(ab.top_bottom==="表")?away:home;
      t[ab.inning]=(t[ab.inning]||0)+pts;
    });
    if(maxInn<9) maxInn=9;
    var ta=0,th=0;
    for(i=1;i<=maxInn;i++){ta+=(away[i]||0);th+=(home[i]||0);}

    var h='<div class="board"><table class="sb"><thead><tr><th class="team"></th>';
    for(i=1;i<=maxInn;i++) h+='<th>'+i+'</th>';
    h+='<th>計</th></tr></thead><tbody>';
    [[g.away,away,ta],[g.home,home,th]].forEach(function(row){
      h+='<tr><td class="team">'+esc(row[0]||"-")+'</td>';
      for(i=1;i<=maxInn;i++){
        var v=row[1][i];
        h+='<td>'+(v==null?"-":v)+'</td>';
      }
      var win=(row[2]===Math.max(ta,th)&&ta!==th);
      h+='<td class="total'+(win?" win":"")+'">'+row[2]+'</td></tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="font-size:11px;color:var(--muted);margin-top:6px;">'+
       '※ 得点は打席結果の「＋N点」を集計した推定値です</div>';
    return h;
  }

  /* ---- 日付のデータ読み込み ---- */
  async function loadDay(){
    var d=dp.value;
    gamesEl.innerHTML='<div class="msg">読み込み中…</div>';
    detailEl.innerHTML="";curGame=null;
    try{
      var r=await fetch(sumPath(d)+"?t="+Date.now());
      if(!r.ok) throw 0;
      var s=await r.json();
      if(!s.games||!s.games.length) throw 0;
      gamesEl.innerHTML="";
      s.games.forEach(function(g){
        var el=document.createElement("div");
        el.className="game";
        el.innerHTML='<div class="gcard">'+esc(g.card||("GAME "+g.game_id))+'</div>'+
          '<div class="gmeta">'+g.atbat_count+' 打席 ／ '+g.pitch_count+' 球</div>';
        el.onclick=function(){loadGame(d,g.game_id,el);};
        gamesEl.appendChild(el);
      });
    }catch(e){
      gamesEl.innerHTML='<div class="msg">この日のデータはまだありません<br>'+
        '<span style="font-size:12px;">Actions の Run workflow で収集できます</span></div>';
    }
  }

  /* ---- 試合詳細 ---- */
  async function loadGame(d,gid,el){
    var list=document.querySelectorAll(".game"),i;
    for(i=0;i<list.length;i++) list[i].classList.remove("on");
    if(el) el.classList.add("on");
    detailEl.innerHTML='<div class="msg">読み込み中…</div>';
    try{
      var r=await fetch(gamePath(d,gid)+"?t="+Date.now());
      curGame=await r.json();
      render();
      detailEl.scrollIntoView({behavior:"smooth",block:"start"});
    }catch(e){
      detailEl.innerHTML='<div class="msg">読み込みに失敗しました</div>';
    }
  }

  /* ---- 描画（フィルタ対応） ---- */
  function render(){
    var g=curGame;
    if(!g) return;
    var fv=document.getElementById("flt")?document.getElementById("flt").value:"all";

    var h=buildBoard(g);
    h+='<div class="toolbar">'+
       '<span class="lb">表示</span>'+
       '<select id="flt" onchange="render()">'+
         '<option value="all">全打席</option>'+
         '<option value="'+esc(g.away)+'">'+esc(g.away)+' の攻撃</option>'+
         '<option value="'+esc(g.home)+'">'+esc(g.home)+' の攻撃</option>'+
         '<option value="score">得点した打席</option>'+
       '</select>'+
       '<button class="btn" onclick="toggleAll(true)">全部ひらく</button>'+
       '<button class="btn" onclick="toggleAll(false)">全部とじる</button>'+
       '</div>';

    // イニングごとにまとめる
    var groups={},order=[];
    (g.atbats||[]).forEach(function(ab){
      if(fv==="score" && !/＋\d+点/.test(ab.result_summary||"")) return;
      if(fv!=="all" && fv!=="score" && ab.batting_team!==fv) return;
      var k=ab.inning+"-"+ab.top_bottom;
      if(!groups[k]){groups[k]=[];order.push(k);}
      groups[k].push(ab);
    });

    if(!order.length){
      h+='<div class="msg">該当する打席がありません</div>';
      detailEl.innerHTML=h;
      return;
    }

    order.forEach(function(k,gi){
      var abs=groups[k],first=abs[0];
      var pts=0;
      abs.forEach(function(a){
        var m=/＋(\d+)点/.exec(a.result_summary||"");
        if(m) pts+=parseInt(m[1],10);
      });
      var np=0;abs.forEach(function(a){np+=(a.pitch_count||0);});
      h+='<div class="inn'+(gi<2?' open':'')+'">'+
        '<div class="inn-h" onclick="this.parentNode.classList.toggle(\'open\')">'+
          '<div><span class="inn-t">'+first.inning+'回'+first.top_bottom+'</span> '+
          '<span class="inn-m">'+esc(first.batting_team||"")+' の攻撃</span></div>'+
          '<div><span class="inn-m">'+abs.length+'打席 / '+np+'球'+
            (pts?' <b style="color:var(--accent)">'+pts+'点</b>':'')+'</span> '+
          '<span class="caret">▶</span></div>'+
        '</div><div class="inn-b">';

      abs.forEach(function(ab){
        var b=ab.batter||{},p=ab.pitcher||{};
        h+='<div class="ab"><div class="ab-h">'+
          '<div class="ab-p">'+
            '<span class="lbl">打者</span> <b>'+esc(b.name||"-")+'</b> '+
            '<span class="no">'+(b.number?"#"+b.number:"")+'</span> '+
            '<span class="lbl">'+esc(b.hand||"")+'</span><br>'+
            '<span class="lbl">投手</span> <b>'+esc(p.name||"-")+'</b> '+
            '<span class="no">'+(p.number?"#"+p.number:"")+'</span> '+
            '<span class="lbl">'+esc(p.hand||"")+'</span>'+
          '</div>'+
          '<span class="res '+rcls(ab.result_summary)+'">'+esc(ab.result_summary||"")+'</span>'+
        '</div>';
        (ab.pitches||[]).forEach(function(pt){
          var c=(pt.course&&pt.course.label)?pt.course.label:"-";
          h+='<div class="pt"><div class="pt-n">'+(pt.no==null?"":pt.no)+'</div>'+
            '<div><span class="pt-t">'+esc(pt.type||"")+'</span> '+
            '<span class="pt-s">'+(pt.speed_kmh?pt.speed_kmh+"km/h":"")+'</span>'+
            '<div class="pt-c">'+esc(c)+'</div></div>'+
            '<div class="pt-r '+rcls(pt.result)+'">'+esc(pt.result||"")+'</div></div>';
        });
        h+='</div>';
      });
      h+='</div></div>';
    });

    detailEl.innerHTML=h;
    var sel=document.getElementById("flt");
    if(sel) sel.value=fv;
  }

  function toggleAll(open){
    var l=document.querySelectorAll(".inn"),i;
    for(i=0;i<l.length;i++){
      if(open) l[i].classList.add("open");
      else l[i].classList.remove("open");
    }
  }

  function shift(n){
    var t=new Date(dp.value+"T00:00:00");
    t.setDate(t.getDate()+n);
    dp.value=t.toISOString().slice(0,10);
    loadDay();
  }
  function today(){dp.value=todayJST();loadDay();}
  dp.addEventListener("change",loadDay);
  today();
</script>
</body>
</html>
